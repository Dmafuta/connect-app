name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/dmafuta/quantumtech-backend
  FRONTEND_IMAGE: ghcr.io/dmafuta/quantumtech-frontend

jobs:

  # ── Job 1: Test Backend ───────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Maven
        run: sudo apt-get install -y maven -q

      - name: Run backend tests
        working-directory: backend
        run: mvn test -q

  # ── Job 2: Test Frontend ──────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci --silent

      - name: Build frontend
        working-directory: Frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.quantumconnect.africa

  # ── Job 3: Build & Push Docker Images ────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Deploy to VPS ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Copy compose files to VPS
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            docker-compose.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/quantumconnect/
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r \
            nginx/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/quantumconnect/

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e

            cd /opt/quantumconnect

            # Update image tags to the newly built SHA
            sudo sed -i "s|BACKEND_IMAGE=.*|BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:${{ github.sha }}|" .env
            sudo sed -i "s|FRONTEND_IMAGE=.*|FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}|" .env

            # Pull new images (packages are public, no login needed)
            docker compose pull frontend backend

            # Restart only app containers — nginx and postgres are unaffected
            docker compose up -d --no-deps --remove-orphans frontend backend

            # Reload nginx config in case nginx.conf changed
            docker exec quantumconnect-nginx-1 nginx -s reload

            # Prune old images
            docker image prune -f

            echo "Deployment complete — commit ${{ github.sha }}"
          ENDSSH

      - name: Smoke test
        run: |
          sleep 15
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://quantumconnect.africa/)
          echo "HTTPS status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed — site returned HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed."
