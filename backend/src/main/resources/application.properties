spring.application.name=quantumtech
server.port=${PORT:8081}

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ispconnect}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Email / SMTP ──────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:server87.web-hosting.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Notification settings ─────────────────────────────────────────────────────
notification.email.from=${MAIL_FROM:${MAIL_USERNAME}}
notification.email.from-name=QuantumConnect

# ── App URL (used in email links) ─────────────────────────────────────────────
app.url=${APP_URL:http://localhost:5173}

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:8080}

# ── Africa's Talking SMS ──────────────────────────────────────────────────────
at.username=${AT_USERNAME}
at.api-key=${AT_API_KEY}
at.sender-id=${AT_SENDER_ID:QuantumNet}
at.environment=${AT_ENV:production}

# ── OTP settings ──────────────────────────────────────────────────────────────
otp.expiry.minutes=5
otp.length=6

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
