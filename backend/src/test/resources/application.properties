# ── Test configuration (uses H2 in-memory — no real DB or SMTP needed) ────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable mail auto-config
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.ssl.enable=false

# Dummy values for required env vars
jwt.secret=dGVzdC1zZWNyZXQtZm9yLXRlc3Rpbmctb25seS1ub3QtdXNlZC1pbi1wcm9k
jwt.expiration=86400000
app.url=http://localhost:8081
cors.allowed-origins=http://localhost:5173
at.username=sandbox
at.api-key=test
at.sender-id=TEST
at.environment=sandbox
notification.email.from=test@test.com
notification.email.from-name=Test
